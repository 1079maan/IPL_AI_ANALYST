# .streamlit/config.toml
# Streamlit configuration for IPL NEXUS

[theme]
base            = "dark"
primaryColor    = "#FF4D00"
backgroundColor = "#06060A"
secondaryBackgroundColor = "#0C0C14"
textColor       = "#E8ECF4"
font            = "sans serif"

[server]
maxUploadSize   = 50
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
